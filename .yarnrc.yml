nodeLinker: node-modules

# The @itishq scope (framelane-renderer / wasm-render-lib) is published to GitHub
# Packages, not the public npm registry. Yarn 4 does NOT read ~/.npmrc, so the
# scope must be mapped here. Auth is NOT stored in this committed file — provide a
# GitHub token with read:packages via your per-user ~/.yarnrc.yml:
#
#   npmRegistries:
#     "https://npm.pkg.github.com":
#       npmAuthToken: <token>
#
# or, in CI, an env var:  YARN_NPM_AUTH_TOKEN / a generated ~/.yarnrc.yml.
# @itishq is our own CI-published renderer, not a third-party package. Yarn's
# npmMinimalAgeGate (default 1440 min / 24h) quarantines any version younger than
# a day — which means every fresh A/B renderer bump would be uninstallable for a
# day. Exempt our own scope from the age gate; it still applies to everything else.
npmPreapprovedPackages:
  - "@itishq/*"

npmScopes:
  itishq:
    npmRegistryServer: "https://npm.pkg.github.com"
    npmAlwaysAuth: true
